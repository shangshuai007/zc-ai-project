server:
  tomcat:
    uri-encoding: UTF-8
  port: 40000
  shutdown: graceful

spring:
  main:
    #解决bean重复定义的。设置为true时，后定义的bean会覆盖之前定义的相同名称的bean
    allow-bean-definition-overriding: true
  cloud:
    nacos:
      config:
        import-check:
          enabled: false
knife4j:
  gateway:
    enabled: true
    # 指定服务发现的模式聚合微服务文档，并且是默认 default 分组
    strategy: discover
    discover:
      # OpenAPI 3.0 规范
      version: openapi3
      enabled: true